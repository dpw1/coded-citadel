name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Do not cancel in-progress Pages deploys — cancellation leaves deployments wedged in deployment_queued.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build
        run: npm run build

      - name: Verify production bundle
        run: |
          test -f dist/index.html
          test -f dist/favicon-32x32.png
          test -f dist/favicon.ico
          grep -q '"available": true' src/data/website-analytics.json || {
            echo "src/data/website-analytics.json is not populated — run npm run fetch-website-analytics locally, commit, and push"
            exit 1
          }
          if grep -qE '\.jsx|/src/main' dist/index.html; then
            echo "dist/index.html still references source JSX — build misconfigured"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
